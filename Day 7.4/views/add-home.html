<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Add Home</title>
		<link rel="stylesheet" href="/output.css" />
		<style>
			@import url('https://fonts.googleapis.com/css2?family=Lato:ital,wght@0,100;0,300;0,400;0,700;0,900;1,100;1,300;1,400;1,700;1,900&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap');

			body {
				font-family: 'Roboto', sans-serif;
			}

			h1,
			h2 {
				font-family: 'Arial', sans-serif;
			}
		</style>
	</head>

	<body
		class="bg-[#111114] min-h-screen flex flex-col items-center justify-center"
	>
		<header class="mb-6 text-center">
			<h2 class="text-3xl font-semibold text-white tracking-tight">
				Register your <span class="text-[#e51414]">Home</span>
			</h2>
		</header>

		<main>
			<form
				action="/host/add-home"
				method="POST"
				class="flex flex-col gap-4 w-72"
			>
				<div class="flex flex-col gap-1.5">
					<label for="housename" class="text-sm text-gray-400"
						>Enter your House Name</label
					>
					<input
						type="text"
						name="housename"
						id="housename"
						autocomplete="off"
						required
						class="bg-[#1c1c21] border border-white/10 text-white text-sm rounded-lg px-4 py-2.5 outline-none focus:border-[#e51414] transition-colors placeholder-gray-600"
						placeholder="e.g. Cozy Mountain Cabin"
					/>
				</div>
				<button
					type="submit"
					class="px-5 py-2.5 bg-[#e51414] hover:bg-[#c10d0d] text-white text-sm font-medium rounded-lg transition-colors"
				>
					Submit
				</button>
			</form>
		</main>
	</body>
</html>
