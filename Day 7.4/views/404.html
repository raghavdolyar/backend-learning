<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>404 — Page Not Found</title>
		<link rel="stylesheet" href="/output.css" />
		<style>
			@import url('https://fonts.googleapis.com/css2?family=Lato:ital,wght@0,100;0,300;0,400;0,700;0,900;1,100;1,300;1,400;1,700;1,900&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap');

			body {
				font-family: 'Roboto', sans-serif;
			}

			h1,
			h2 {
				font-family: 'Arial', sans-serif;
			}

			.glow {
				text-shadow: 0 0 80px rgba(229, 20, 20, 0.4);
			}

			@keyframes float {
				0%,
				100% {
					transform: translateY(0px);
				}

				50% {
					transform: translateY(-10px);
				}
			}

			.float {
				animation: float 3.5s ease-in-out infinite;
			}
		</style>
	</head>

	<body
		class="bg-[#111114] min-h-screen flex flex-col items-center justify-center gap-4 text-center px-4"
	>
		<h1
			class="text-[8rem] font-bold text-[#e51414] leading-none glow float select-none"
		>
			404
		</h1>

		<h2 class="text-2xl text-white tracking-tight">Page not found</h2>

		<p class="text-gray-500 text-sm max-w-xs">
			The page you're looking for doesn't exist or has been moved.
		</p>

		<a
			href="/"
			class="mt-4 px-5 py-2.5 bg-[#e51414] hover:bg-[#c10d0d] text-white text-sm font-medium rounded-lg transition-colors"
		>
			Go to Home
		</a>
	</body>
</html>
